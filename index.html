 <!DOCTYPE html>
  <html lang="en">                                                                                                                                                                   
  <head>
    <meta charset="UTF-8">                                                                                                                                                           
    <title>EUD-3448 — Toggle layout</title>
    <meta http-equiv="Content-Security-Policy" content="                                                                                                                             
      default-src 'self';
      script-src 'nonce-abc123xyz' 'strict-dynamic' https:;                                                                                                                          
      style-src 'self' 'nonce-abc123xyz';                                                                                                                                            
      img-src 'self' data: https:;
      font-src 'self' data: https:;                                                                                                                                                  
      connect-src 'self' https:;                                                                                                                                                     
      frame-src 'self' https:;">
    <style nonce="abc123xyz">                                                                                                                                                        
      body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
      #status { padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }                                                                                         
      #status.ok { background: #e8f5e9; border: 1px solid #4caf50; }                                                                                                                 
      #status.fail { background: #ffebee; border: 1px solid #f44336; white-space: pre-wrap; }                                                                                        
    </style>                                                                                                                                                                         
    <script nonce="abc123xyz">                                                                                                                                                       
      const SETTINGS_ID = 'YOUR_SETTINGS_ID';                                                                                                                                        
      const PR_NUMBER   = '1332';                                                                                                                                                    
      const loader = document.createElement('script');
      loader.id = 'usercentrics-cmp';                                                                                                                                                
      loader.src = `https://web.cmp.usercentrics-sandbox.eu/ui/pr/${PR_NUMBER}/loader.js`;                                                                                           
      loader.async = true;
      loader.nonce = 'abc123xyz';                                                                                                                                                    
      loader.setAttribute('data-settings-id', SETTINGS_ID);
      // loader.setAttribute('data-sandbox', '1');  // uncomment if SETTINGS_ID is from sandbox                                                                                      
      document.head.appendChild(loader);                                                                                                                                             
    </script>
  </head>                                                                                                                                                                            
  <body>      
    <h1>EUD-3448 — Toggle layout (CB &amp; Wix, 1–6 categories)</h1>
    <p>Open the banner, expand to second layer. Verify the toggle grid renders correctly for 1–6 categories. No inline <code>--count</code> on toggle wrappers.</p>                  
    <div id="status">Watching CSP violations…</div>                                                                                                                                  
    <p>Run <code>checkToggleCount()</code> in the console.</p>                                                                                                                       
    <script nonce="abc123xyz">                                                                                                                                                       
      const violations = [];                                                                                                                                                         
      document.addEventListener('securitypolicyviolation', (e) => {
        if (e.violatedDirective.startsWith('style-src')) violations.push(e);                                                                                                         
        render();                                                                                                                                                                    
      });
      function render() {                                                                                                                                                            
        const el = document.getElementById('status');
        if (!violations.length) { el.className = 'ok'; el.textContent = 'OK — no style-src violations'; }
        else { el.className = 'fail'; el.textContent = `FAIL — ${violations.length} violation(s):\n` +                                                                               
          violations.map(v => `${v.violatedDirective}: "${v.sample || ''}" @ ${v.sourceFile}:${v.lineNumber}`).join('\n'); }                                                         
      }                                                                                                                                                                              
      render();                                                                                                                                                                      
      window.checkToggleCount = () => {                                                                                                                                              
        const wrappers = document.getElementById('usercentrics-cmp-ui')?.shadowRoot?.querySelectorAll('.toggle-wrapper') ?? [];                                                      
        console.table([...wrappers].map(w => ({                                                                                                                                      
          classes: w.className,                                                                                                                                                      
          inlineStyle: w.getAttribute('style') || '(none)',                                                                                                                          
          countVar: getComputedStyle(w).getPropertyValue('--count').trim(),
        })));                                                                                                                                                                        
      };
    </script>                                                                                                                                                                        
  </body>     
  </html>
